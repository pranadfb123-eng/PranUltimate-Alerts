name: PranUltimate Alert Check

# FULLY DISABLED 2026-07-09: All runs moved to local Windows Task Scheduler (run_alerts.bat).
# workflow_dispatch was left active after the schedule was commented out on 2026-07-06,
# which allowed accidental after-hours GitHub Actions triggers that sent spurious
# "Dhan token expired" Telegram alerts (the committed GH version lacked the local
# market-hours guard). Disabling workflow_dispatch closes that gap.
#
# To restore GitHub Actions runs: uncomment the schedule: block AND workflow_dispatch below,
# and ensure check_alerts.py (with its _in_market_hours() guard) is committed first.
#
# Original schedule (IST candle-close boundaries, IST = UTC + 5:30):
# 10:15, 11:15, 12:15, 13:15, 14:15, 15:15, 15:30 IST
on:
  # schedule:
  #   - cron: "45 4 * * 1-5"
  #   - cron: "45 5 * * 1-5"
  #   - cron: "45 6 * * 1-5"
  #   - cron: "45 7 * * 1-5"
  #   - cron: "45 8 * * 1-5"
  #   - cron: "45 9 * * 1-5"
  #   - cron: "0 10 * * 1-5"
  # workflow_dispatch: {}   # DISABLED 2026-07-09 — see note above
  push:
    branches:
      - __never_trigger__   # dummy trigger: workflow exists for documentation only

jobs:
  check-alerts:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install pandas numpy requests

      - name: Run alert checker
        env:
          DHAN_CLIENT_ID:         ${{ secrets.DHAN_CLIENT_ID }}
          DHAN_ACCESS_TOKEN:      ${{ secrets.DHAN_ACCESS_TOKEN }}
          TELEGRAM_BOT_TOKEN:     ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:       ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN_SP:  ${{ secrets.TELEGRAM_BOT_TOKEN_SP }}
          TELEGRAM_CHAT_ID_SP:    ${{ secrets.TELEGRAM_CHAT_ID_SP }}
        run: python scanner/check_alerts.py

      - name: Commit updated alert state
        run: |
          git config user.name "PranUltimate Alert Bot"
          git config user.email "actions@github.com"
          git add server/alerts_state.json
          git diff --staged --quiet || git commit -m "Update alert state — $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
