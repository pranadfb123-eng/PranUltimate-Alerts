name: PranUltimate Alert Check

# Runs ONLY at 1H/2H candle-close boundaries (NSE candles anchor to 9:15 IST
# open): 10:15, 11:15, 12:15, 13:15, 14:15, 15:15, 15:30 IST.
# IST = UTC + 5:30, so each line below is the IST time minus 5:30.
on:
  schedule:
    - cron: "45 4 * * 1-5"
    - cron: "45 5 * * 1-5"
    - cron: "45 6 * * 1-5"
    - cron: "45 7 * * 1-5"
    - cron: "45 8 * * 1-5"
    - cron: "45 9 * * 1-5"
    - cron: "0 10 * * 1-5"
  workflow_dispatch: {}

jobs:
  check-alerts:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install pandas numpy requests

      - name: Run alert checker
        env:
          DHAN_CLIENT_ID:         ${{ secrets.DHAN_CLIENT_ID }}
          DHAN_ACCESS_TOKEN:      ${{ secrets.DHAN_ACCESS_TOKEN }}
          TELEGRAM_BOT_TOKEN:     ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:       ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN_SP:  ${{ secrets.TELEGRAM_BOT_TOKEN_SP }}
          TELEGRAM_CHAT_ID_SP:    ${{ secrets.TELEGRAM_CHAT_ID_SP }}
        run: python scanner/check_alerts.py

      - name: Commit updated alert state
        run: |
          git config user.name "PranUltimate Alert Bot"
          git config user.email "actions@github.com"
          git add server/alerts_state.json
          git diff --staged --quiet || git commit -m "Update alert state — $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
